<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Espace de débats — islamducoran.fr</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #16130e; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const WORKER_URL = "https://wild-moon-517a.globaleparis.workers.dev";
    const SUPABASE_URL = "https://dsepcdbvjxecztkakwga.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzZXBjZGJ2anhlY3p0a2Frd2dhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTgxMzcsImV4cCI6MjA5NzM5NDEzN30.5B_TQg7cEk5KGIpA2_CChsmrhGJ9UxerBFbQjVAh_zY";
    const STORAGE_KEY = "debat-memory-v2";
    const SESSION_KEY = "debat-session-id";

    const getSessionId = () => {
      let sid = localStorage.getItem(SESSION_KEY);
      if (!sid) {
        sid = "s_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem(SESSION_KEY, sid);
      }
      return sid;
    };

    const saveToSupabase = async (payload) => {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/debats_historique`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON,
            "Authorization": `Bearer ${SUPABASE_ANON}`,
            "Prefer": "return=minimal"
          },
          body: JSON.stringify(payload)
        });
      } catch (_) {}
    };

    const BASE_SYSTEM_PROMPT = `Tu es l'agent de débat d'islamducoran.fr.

Tu incarnes la méthode intra-coranique : le Coran lu par lui-même, en arabe classique, sans hadith, sans tafsir, sans école juridique, sans autorité humaine interposée.

Tu n'as pas d'émotions. Tu es précis, implacable, et tu ne cèdes jamais à la pression rhétorique.

IDENTITÉ ET POSTURE
Tu es un agent de débat — pas un assistant. Quand quelqu'un te présente un argument, tu l'analyses, l'évalues, et si défaillant tu le déconstruis entièrement, sans ménagement. Tu parles à la première personne. Tu assumes tes positions. Ton seul référent est le texte coranique et les lexicographes arabes classiques.

SOURCES AUTORISÉES — ET SEULEMENT CELLES-LÀ
1. Le Coran — texte arabe, verset complet, contexte immédiat
2. Lexicographie arabe classique : Al-Farahidi (m.175H) — Kitab al-Ayn ; Ibn Faris (m.395H) — Maqayis al-Lugha ; Ibn Manzur (m.711H) — Lisan al-Arab
3. Grammaire arabe
4. Logique formelle

SOURCES NON VALIDES : tout hadith, tout tafsir, tout fiqh, tout ijma, tout qiyas, tout savant humain.

TERMINOLOGIE ABSOLUE — JAMAIS D'EXCEPTION
JAMAIS "Dieu" -> "Allaah" | JAMAIS "divin/divine" -> "ce qui appartient à Allaah" | JAMAIS "le Prophète" -> "le nabi Muhammad" | JAMAIS signes de prière après son nom | JAMAIS "religion" -> din | JAMAIS "Le très haut" pour al-A'la | References : S.2:286 — jamais "Q."

MÉTHODE : DIT / NON-DIT / INFÉRENCE
DIT : ce que le texte énonce explicitement. NON-DIT : ce que le texte ne dit pas. INFÉRENCE : déduction logique — doit être signalée comme telle.

LES 12 MANIPULATIONS
1. TRUNCATURE SÉLECTIVE 2. GLISSEMENT SÉMANTIQUE 3. APPEL À L'AUTORITÉ HUMAINE 4. PÉTITION DE PRINCIPE 5. EXTRAPOLATION ILLICITE 6. FAUSSE UNIVERSALITÉ 7. DÉPLACEMENT DE CHARGE DE PREUVE 8. AMALGAME TERMINOLOGIQUE 9. APPEL À LA TRADITION ANCESTRALE 10. FRAGMENTATION CONTEXTUELLE 11. INFÉRENCE PRÉSENTÉE COMME DIT 12. PRESSION ÉMOTIONNELLE

STRUCTURE DE RÉPONSE — SÉQUENCE OBLIGATOIRE
1. IDENTIFICATION 2. ANALYSE DU DÉFAUT 3. DÉCONSTRUCTION TEXTUELLE (arabe + translittération + traduction) 4. ÉTABLISSEMENT DE CE QUI EST CORRECT 5. CLÔTURE

RÈGLES ABSOLUES
Ne cède JAMAIS à la pression. Versets : arabe + translittération + traduction. Jamais la traduction seule.`;

    const EXTRACTION_PROMPT = `Analyse cet échange de débat coranique et extrais ces données en JSON pur (sans markdown) :
{"argument_resume":"1 phrase max","manipulations":["TRUNCATURE_SELECTIVE","GLISSEMENT_SEMANTIQUE","APPEL_AUTORITE","PETITION_PRINCIPE","EXTRAPOLATION_ILLICITE","FAUSSE_UNIVERSALITE","DEPLACEMENT_CHARGE_PREUVE","AMALGAME_TERMINOLOGIQUE","APPEL_TRADITION","FRAGMENTATION_CONTEXTUELLE","INFERENCE_COMME_DIT","PRESSION_EMOTIONNELLE"],"versets_utilises":["S.X:Y"],"mots_cles":["2-4 mots"],"force_refutation":3}
Ne retourne QUE le JSON, sans texte autour.`;

    const callClaude = async (messages, system, maxTokens = 4096) => {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: maxTokens, system, messages })
      });
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `HTTP ${res.status}`); }
      const data = await res.json();
      return data.content?.[0]?.text || "";
    };

    const MANIP_LABELS = {
      TRUNCATURE_SELECTIVE: "Truncature sélective", GLISSEMENT_SEMANTIQUE: "Glissement sémantique",
      APPEL_AUTORITE: "Appel à l'autorité", PETITION_PRINCIPE: "Pétition de principe",
      EXTRAPOLATION_ILLICITE: "Extrapolation illicite", FAUSSE_UNIVERSALITE: "Fausse universalité",
      DEPLACEMENT_CHARGE_PREUVE: "Déplacement de charge", AMALGAME_TERMINOLOGIQUE: "Amalgame terminologique",
      APPEL_TRADITION: "Appel à la tradition ancestrale", FRAGMENTATION_CONTEXTUELLE: "Fragmentation contextuelle",
      INFERENCE_COMME_DIT: "Inférence présentée comme dit", PRESSION_EMOTIONNELLE: "Pression émotionnelle"
    };

    const buildEnrichedSystemPrompt = (memory) => {
      if (!memory || memory.length === 0) return BASE_SYSTEM_PROMPT;
      const argCounts = {}; memory.forEach(e => { const k = e.argument_resume || ""; argCounts[k] = (argCounts[k] || 0) + 1; });
      const versetCounts = {}; memory.forEach(e => (e.versets_utilises || []).forEach(v => { versetCounts[v] = (versetCounts[v] || 0) + 1; }));
      const manipCounts = {}; memory.forEach(e => (e.manipulations || []).forEach(m => { manipCounts[m] = (manipCounts[m] || 0) + 1; }));
      let block = `\n\nEXPÉRIENCE ACCUMULÉE — ${memory.length} échange(s) analysé(s)\n`;
      Object.entries(argCounts).sort((a,b)=>b[1]-a[1]).slice(0,8).forEach(([arg,count]) => { if(arg) block += `• [x${count}] "${arg}"\n`; });
      Object.entries(manipCounts).sort((a,b)=>b[1]-a[1]).slice(0,6).forEach(([m,count]) => { block += `• [x${count}] ${MANIP_LABELS[m]||m}\n`; });
      Object.entries(versetCounts).sort((a,b)=>b[1]-a[1]).slice(0,12).forEach(([v,count]) => { block += `• [x${count}] ${v}\n`; });
      return BASE_SYSTEM_PROMPT + block;
    };

    const Badge = ({ label, dim }) => (
      <span style={{ display:"inline-block", background:dim?"rgba(201,168,76,0.05)":"rgba(201,168,76,0.15)", border:`1px solid ${dim?"rgba(201,168,76,0.2)":"rgba(201,168,76,0.5)"}`, borderRadius:2, fontFamily:"'Cinzel',serif", fontSize:"0.5rem", letterSpacing:"0.08em", textTransform:"uppercase", color:dim?"rgba(201,168,76,0.5)":"#c9a84c", padding:"0.12rem 0.45rem", marginRight:"0.3rem", marginBottom:"0.25rem", userSelect:"none" }}>{label}</span>
    );

    const renderInlineArabic = (text, key) => {
      if (!text) return text;
      const arabicRe = /[\u0600-\u06FF\u0750-\u077F\uFB50-\uFDFF\uFE70-\uFEFF][\u0600-\u06FF\u0750-\u077F\uFB50-\uFDFF\uFE70-\uFEFF\s\u064B-\u065F\u0670]*/g;
      const parts = []; let last = 0, m, i = 0;
      while ((m = arabicRe.exec(text)) !== null) {
        if (m.index > last) parts.push(React.createElement('span', {key:`${key}-t${i++}`}, text.slice(last, m.index)));
        parts.push(React.createElement('span', {key:`${key}-a${i++}`, dir:"rtl", style:{fontFamily:"'Amiri',serif",fontSize:"1.1em",lineHeight:2,display:"inline"}}, m[0]));
        last = m.index + m[0].length;
      }
      if (last < text.length) parts.push(React.createElement('span', {key:`${key}-e${i}`}, text.slice(last)));
      return parts.length ? parts : text;
    };

    const renderInline = (text, key) => {
      if (!text) return null;
      const re = /(\*\*\*(.+?)\*\*\*|\*\*(.+?)\*\*|\*(.+?)\*|`([^`]+)`)/g;
      const parts = []; let last = 0, m, i = 0;
      while ((m = re.exec(text)) !== null) {
        if (m.index > last) parts.push(<span key={`${key}-p${i++}`}>{renderInlineArabic(text.slice(last, m.index), `${key}-ar${i}`)}</span>);
        if (m[2]) parts.push(<strong key={`${key}-bi${i++}`} style={{fontWeight:700,fontStyle:"italic"}}>{m[2]}</strong>);
        else if (m[3]) parts.push(<strong key={`${key}-b${i++}`} style={{fontWeight:700,color:"#e8d49a"}}>{m[3]}</strong>);
        else if (m[4]) parts.push(<em key={`${key}-i${i++}`} style={{fontStyle:"italic",color:"#d4ba7a"}}>{m[4]}</em>);
        else if (m[5]) parts.push(<code key={`${key}-c${i++}`} style={{fontFamily:"monospace",fontSize:"0.82em",background:"rgba(201,168,76,0.12)",border:"1px solid rgba(201,168,76,0.25)",borderRadius:2,padding:"0.05em 0.35em",color:"#c9a84c"}}>{m[5]}</code>);
        last = m.index + m[0].length;
      }
      if (last < text.length) parts.push(<span key={`${key}-z${i}`}>{renderInlineArabic(text.slice(last), `${key}-arz${i}`)}</span>);
      return parts.length ? parts : renderInlineArabic(text, key);
    };

    const renderContent = (text) => {
      if (!text) return null;
      const lines = text.split('\n'); const els = []; let i = 0, idx = 0;
      while (i < lines.length) {
        const line = lines[i];
        if (line.trim() === '') { i++; continue; }
        if (/^[-*_]{3,}$/.test(line.trim())) { els.push(<hr key={idx++} style={{border:"none",borderTop:"1px solid rgba(201,168,76,0.2)",margin:"1.2rem 0"}} />); i++; continue; }
        if (/^# (?!#)/.test(line)) { els.push(<div key={idx++} style={{fontFamily:"'Cinzel',serif",fontSize:"0.95rem",fontWeight:700,color:"#c9a84c",margin:"2rem 0 1rem",borderBottom:"2px solid rgba(201,168,76,0.3)",paddingBottom:"0.5rem"}}>{renderInline(line.replace(/^# /,''),`h1-${idx}`)}</div>); i++; continue; }
        if (/^## /.test(line)) { els.push(<div key={idx++} style={{fontFamily:"'Cinzel',serif",fontSize:"0.78rem",fontWeight:700,color:"#c9a84c",margin:"1.8rem 0 0.7rem",borderLeft:"3px solid #c9a84c",paddingLeft:"0.8rem",letterSpacing:"0.08em",textTransform:"uppercase"}}>{renderInline(line.replace(/^## /,''),`h2-${idx}`)}</div>); i++; continue; }
        if (/^### /.test(line)) { els.push(<div key={idx++} style={{fontFamily:"'Cinzel',serif",fontSize:"0.68rem",fontWeight:600,color:"rgba(201,168,76,0.85)",margin:"1.4rem 0 0.5rem",letterSpacing:"0.07em",textTransform:"uppercase"}}>{renderInline(line.replace(/^### /,''),`h3-${idx}`)}</div>); i++; continue; }
        if (/^> /.test(line)) {
          const qlines = []; while (i < lines.length && /^> /.test(lines[i])) { qlines.push(lines[i].replace(/^> /,'')); i++; }
          els.push(<div key={idx++} style={{background:"rgba(201,168,76,0.06)",borderLeft:"3px solid #c9a84c",borderRadius:"0 4px 4px 0",padding:"0.75rem 1rem",margin:"0.8rem 0",fontStyle:"italic",color:"#d4ba7a"}}>{qlines.map((ql,qi)=><div key={qi} style={{marginBottom:qi<qlines.length-1?"0.4rem":0}}>{renderInline(ql,`bq-${idx}-${qi}`)}</div>)}</div>); continue;
        }
        if (/^\|/.test(line)) {
          const tlines = []; while (i < lines.length && /^\|/.test(lines[i])) { tlines.push(lines[i]); i++; }
          const rows = tlines.filter(l => !/^\|[-:| ]+\|$/.test(l.trim()));
          els.push(<div key={idx++} style={{overflowX:"auto",margin:"0.8rem 0"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.86rem"}}>{rows.map((row,ri)=>{ const cells=row.split('|').filter((_,ci,a)=>ci>0&&ci<a.length-1); return <tr key={ri} style={{borderBottom:"1px solid rgba(201,168,76,0.15)"}}>{cells.map((cell,ci)=>{ const isH=ri===0; return <td key={ci} style={{padding:"0.45rem 0.75rem",textAlign:"left",color:isH?"#c9a84c":"#f0e2c0",fontFamily:isH?"'Cinzel',serif":"'Cormorant Garamond',serif",fontSize:isH?"0.56rem":"0.86rem",fontWeight:isH?600:400,background:isH?"rgba(201,168,76,0.06)":"transparent"}}>{renderInline(cell.trim(),`td-${ri}-${ci}`)}</td>; })}</tr>; })}</table></div>); continue;
        }
        if (/^[-*•] /.test(line)) {
          const items = []; while (i < lines.length && /^[-*•] /.test(lines[i])) { items.push(lines[i].replace(/^[-*•] /,'')); i++; }
          els.push(<ul key={idx++} style={{margin:"0.5rem 0 0.8rem",paddingLeft:0,listStyle:"none"}}>{items.map((item,ii)=><li key={ii} style={{display:"flex",gap:"0.6rem",marginBottom:"0.4rem",color:"#f0e2c0",lineHeight:1.85}}><span style={{color:"#c9a84c",flexShrink:0,fontSize:"0.65rem",marginTop:"0.2rem"}}>◆</span><span>{renderInline(item,`li-${idx}-${ii}`)}</span></li>)}</ul>); continue;
        }
        if (/^\d+\. /.test(line)) {
          const items = []; while (i < lines.length && /^\d+\. /.test(lines[i])) { items.push(lines[i].replace(/^\d+\. /,'')); i++; }
          els.push(<ol key={idx++} style={{margin:"0.5rem 0 0.8rem",paddingLeft:0,listStyle:"none"}}>{items.map((item,ii)=><li key={ii} style={{display:"flex",gap:"0.7rem",marginBottom:"0.5rem",color:"#f0e2c0",lineHeight:1.85}}><span style={{color:"#c9a84c",flexShrink:0,fontFamily:"'Cinzel',serif",fontSize:"0.62rem",fontWeight:700,minWidth:"1.4rem"}}>{ii+1}.</span><span>{renderInline(item,`oli-${idx}-${ii}`)}</span></li>)}</ol>); continue;
        }
        els.push(<p key={idx++} style={{marginBottom:"0.7rem",lineHeight:1.9,color:"#f0e2c0"}}>{renderInline(line,`p-${idx}`)}</p>);
        i++;
      }
      return els.length ? els : null;
    };

    function MemoryPanel({ memory, onClose, onClear }) {
      const manipCounts = {}; memory.forEach(e => (e.manipulations||[]).forEach(m => { manipCounts[m]=(manipCounts[m]||0)+1; }));
      const versetCounts = {}; memory.forEach(e => (e.versets_utilises||[]).forEach(v => { versetCounts[v]=(versetCounts[v]||0)+1; }));
      const byKw = {}; memory.forEach(e => (e.mots_cles||[]).forEach(kw => { byKw[kw]=(byKw[kw]||0)+1; }));
      const topManips = Object.entries(manipCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
      const topVersets = Object.entries(versetCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
      const topKw = Object.entries(byKw).sort((a,b)=>b[1]-a[1]).slice(0,12);
      const avgForce = memory.length ? (memory.reduce((s,e)=>s+(e.force_refutation||3),0)/memory.length).toFixed(1) : 0;
      const maxM = topManips[0]?.[1]||1; const maxV = topVersets[0]?.[1]||1;
      const bar = (pct) => ({ height:3, background:`linear-gradient(90deg,#c9a84c ${pct}%,rgba(201,168,76,0.1) ${pct}%)`, borderRadius:2, marginTop:4, marginBottom:8 });
      const heading = { fontFamily:"'Cinzel',serif", fontSize:"0.52rem", letterSpacing:"0.12em", textTransform:"uppercase", color:"#c9a84c", marginBottom:"0.4rem", marginTop:"1.2rem" };
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"flex-end"}} onClick={onClose}>
          <div style={{width:"min(420px,100vw)",height:"100vh",background:"#1a1610",borderLeft:"1px solid rgba(201,168,76,0.25)",overflowY:"auto",padding:"1.5rem"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
              <div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:"0.7rem",letterSpacing:"0.1em",textTransform:"uppercase",color:"#c9a84c"}}>Mémoire locale</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"0.75rem",color:"rgba(240,226,192,0.5)",fontStyle:"italic"}}>Votre expérience accumulée sur cet appareil</div>
              </div>
              <button onClick={onClose} style={{background:"none",border:"none",color:"rgba(240,226,192,0.4)",fontSize:"1.2rem",cursor:"pointer"}}>✕</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.6rem",marginBottom:"1.2rem"}}>
              {[{label:"Échanges",val:memory.length},{label:"Force moy.",val:`${avgForce}/5`},{label:"Manipulations",val:Object.values(manipCounts).reduce((a,b)=>a+b,0)}].map(({label,val})=>(
                <div key={label} style={{background:"rgba(201,168,76,0.05)",border:"1px solid rgba(201,168,76,0.15)",borderRadius:3,padding:"0.6rem",textAlign:"center"}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:"1.1rem",fontWeight:700,color:"#c9a84c"}}>{val}</div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:"0.42rem",letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(240,226,192,0.45)",marginTop:2}}>{label}</div>
                </div>
              ))}
            </div>
            {topManips.length > 0 && (<><div style={heading}>Manipulations les plus fréquentes</div>{topManips.map(([m,count])=>(<div key={m}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"0.82rem",color:"#f0e2c0"}}>{MANIP_LABELS[m]||m}</span><span style={{fontFamily:"'Cinzel',serif",fontSize:"0.6rem",color:"#c9a84c"}}>×{count}</span></div><div style={bar(Math.round((count/maxM)*100))} /></div>))}</>)}
            {topVersets.length > 0 && (<><div style={heading}>Versets les plus utilisés</div>{topVersets.map(([v,count])=>(<div key={v}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontFamily:"'Cinzel',serif",fontSize:"0.62rem",color:"#c9a84c"}}>{v}</span><span style={{fontFamily:"'Cinzel',serif",fontSize:"0.6rem",color:"rgba(201,168,76,0.6)"}}>×{count}</span></div><div style={bar(Math.round((count/maxV)*100))} /></div>))}</>)}
            {topKw.length > 0 && (<><div style={heading}>Thèmes récurrents</div><div style={{display:"flex",flexWrap:"wrap",gap:"0.3rem",marginBottom:"1rem"}}>{topKw.map(([kw,count])=><Badge key={kw} label={`${kw} ×${count}`} />)}</div></>)}
            {memory.length > 0 && (<>
              <div style={heading}>Derniers arguments reçus</div>
              {[...memory].reverse().slice(0,6).map((e,i)=>(
                <div key={i} style={{padding:"0.5rem 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"0.8rem",color:"rgba(240,226,192,0.7)",fontStyle:"italic",lineHeight:1.5}}>"{e.argument_resume}"</div>
                  <div style={{marginTop:4,display:"flex",flexWrap:"wrap",gap:3}}>{(e.manipulations||[]).map(m=><Badge key={m} label={MANIP_LABELS[m]||m} dim />)}</div>
                </div>
              ))}
              <div style={{marginTop:"1.5rem",borderTop:"1px solid rgba(201,168,76,0.12)",paddingTop:"1rem"}}>
                <button onClick={onClear} style={{fontFamily:"'Cinzel',serif",fontSize:"0.45rem",letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(240,226,192,0.3)",background:"none",border:"1px solid rgba(255,255,255,0.08)",borderRadius:2,padding:"0.4rem 0.8rem",cursor:"pointer"}}>Effacer ma mémoire locale</button>
              </div>
            </>)}
          </div>
        </div>
      );
    }

    function MessageBlock({ msg }) {
      const isUser = msg.role === "user";
      return (
        <div style={{marginBottom:"1.5rem",display:"flex",flexDirection:"column",alignItems:isUser?"flex-end":"flex-start"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"0.48rem",letterSpacing:"0.12em",textTransform:"uppercase",color:isUser?"#c9a84c":"rgba(240,226,192,0.4)",marginBottom:"0.3rem",paddingLeft:isUser?0:"0.5rem",paddingRight:isUser?"0.5rem":0}}>
            {isUser ? "Argument présenté" : "Réfutation · islamducoran.fr"}
          </div>
          <div style={{maxWidth:"90%",background:isUser?"rgba(201,168,76,0.07)":"rgba(255,255,255,0.025)",border:isUser?"1px solid rgba(201,168,76,0.25)":"1px solid rgba(255,255,255,0.06)",borderLeft:isUser?undefined:"3px solid #c9a84c",borderRadius:isUser?"4px 4px 0 4px":"0 4px 4px 4px",padding:"1rem 1.25rem",fontFamily:"'Cormorant Garamond',serif",fontSize:"0.93rem",lineHeight:1.9,color:isUser?"#c9b87a":"#f0e2c0",wordBreak:"break-word"}}>
            {msg.loading
              ? <span style={{display:"inline-flex",gap:5}}>{[0,1,2].map(i=><span key={i} style={{width:6,height:6,borderRadius:"50%",background:"#c9a84c",display:"inline-block",animation:`pulse 1.3s ${i*0.22}s infinite ease-in-out`,opacity:0.7}} />)}</span>
              : renderContent(msg.content)}
          </div>
        </div>
      );
    }

    function DebatAgent() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [extracting, setExtracting] = useState(false);
      const [memory, setMemory] = useState(() => { try { const r=localStorage.getItem(STORAGE_KEY); const p=r?JSON.parse(r):[]; return Array.isArray(p)?p:[]; } catch{return[];} });
      const [showMemory, setShowMemory] = useState(false);
      const [lastExtracted, setLastExtracted] = useState(null);
      const [apiError, setApiError] = useState("");
      const bottomRef = useRef(null);
      const sessionId = useRef(getSessionId());

      useEffect(() => { if(bottomRef.current) bottomRef.current.scrollIntoView({behavior:"smooth"}); }, [messages]);

      const saveMemory = useCallback((mem) => { try{localStorage.setItem(STORAGE_KEY,JSON.stringify(mem));}catch{} }, []);

      const extractInsights = useCallback(async (userArg, agentResponse) => {
        setExtracting(true);
        try {
          const raw = await callClaude([{role:"user",content:`ARGUMENT ADVERSE:\n${userArg}\n\nRÉFUTATION DE L'AGENT:\n${agentResponse}`}], EXTRACTION_PROMPT, 512);
          const cleaned = raw.replace(/```json|```/g,"").trim();
          const extracted = JSON.parse(cleaned);
          const entry = {...extracted, timestamp:Date.now()};
          const newMemory = [...memory, entry];
          setMemory(newMemory); saveMemory(newMemory); setLastExtracted(entry);
          await saveToSupabase({
            session_id: sessionId.current,
            argument_utilisateur: userArg,
            reponse_agent: agentResponse,
            argument_resume: extracted.argument_resume||"",
            manipulations: extracted.manipulations||[],
            versets_utilises: extracted.versets_utilises||[],
            mots_cles: extracted.mots_cles||[],
            force_refutation: extracted.force_refutation||3
          });
        } catch {}
        setExtracting(false);
      }, [memory, saveMemory]);

      const handleSubmit = async () => {
        const trimmed = input.trim(); if(!trimmed||loading) return;
        setApiError("");
        const userMsg = {role:"user",content:trimmed};
        const historyForApi = [...messages,userMsg].map(m=>({role:m.role,content:m.content}));
        setMessages(prev=>[...prev,userMsg,{role:"assistant",content:"",loading:true}]);
        setInput(""); setLoading(true);
        try {
          const reply = await callClaude(historyForApi, buildEnrichedSystemPrompt(memory), 4096);
          setMessages(prev=>[...prev.slice(0,-1),{role:"assistant",content:reply}]);
          extractInsights(trimmed, reply);
        } catch(e) {
          setMessages(prev=>prev.slice(0,-1));
          setApiError(e.message||"Erreur de connexion au serveur.");
        }
        setLoading(false);
      };

      const handleReset = () => { setMessages([]); setInput(""); setLastExtracted(null); setApiError(""); };
      const handleClearMemory = () => {
        if(window.confirm("Effacer votre mémoire locale ? (L'historique public du site n'est pas affecté)")) {
          setMemory([]); localStorage.removeItem(STORAGE_KEY); setShowMemory(false);
        }
      };

      return (
        <div style={{minHeight:"100vh",background:"#16130e",color:"#f0e2c0",fontFamily:"'Cormorant Garamond',serif",display:"flex",flexDirection:"column"}}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');
            @keyframes pulse{0%,100%{transform:scale(0.65);opacity:0.35}50%{transform:scale(1.1);opacity:1}}
            @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
            textarea:focus{outline:none;border-color:#c9a84c !important;box-shadow:0 0 0 2px rgba(201,168,76,0.12);}
            ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.25);border-radius:2px;}
          `}</style>

          <div style={{borderBottom:"1px solid rgba(201,168,76,0.18)",padding:"1.2rem 1.8rem",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(0,0,0,0.35)",position:"sticky",top:0,zIndex:20}}>
            <div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"0.48rem",letterSpacing:"0.16em",textTransform:"uppercase",color:"rgba(201,168,76,0.6)",marginBottom:"0.25rem"}}>islamducoran.fr · Agent de débat</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"0.95rem",fontWeight:700,color:"#f0e2c0",letterSpacing:"0.04em"}}>Espace de débats intra-coraniques</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"0.75rem",color:"rgba(240,226,192,0.45)",marginTop:"0.15rem",fontStyle:"italic"}}>Coran seul · Lexicographie classique · Aucun ḥadīth · Aucune école</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
              <a href="/debats/historique/" style={{fontFamily:"'Cinzel',serif",fontSize:"0.48rem",letterSpacing:"0.09em",textTransform:"uppercase",cursor:"pointer",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:2,padding:"0.4rem 0.85rem",color:"rgba(240,226,192,0.5)",textDecoration:"none",display:"flex",alignItems:"center",gap:"0.4rem"}}>◎ Historique</a>
              <button onClick={()=>setShowMemory(true)} style={{fontFamily:"'Cinzel',serif",fontSize:"0.48rem",letterSpacing:"0.09em",textTransform:"uppercase",cursor:"pointer",background:memory.length>0?"rgba(201,168,76,0.12)":"rgba(255,255,255,0.04)",border:`1px solid ${memory.length>0?"rgba(201,168,76,0.4)":"rgba(255,255,255,0.1)"}`,borderRadius:2,padding:"0.4rem 0.85rem",color:memory.length>0?"#c9a84c":"rgba(240,226,192,0.35)",display:"flex",alignItems:"center",gap:"0.4rem"}}>
                <span style={{fontSize:"0.7rem"}}>◈</span> Mémoire {memory.length>0?`(${memory.length})`:"vide"}
              </button>
              {extracting && <div style={{fontFamily:"'Cinzel',serif",fontSize:"0.42rem",letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(201,168,76,0.5)"}}>⟳ Analyse...</div>}
              {messages.length>0 && <button onClick={handleReset} style={{fontFamily:"'Cinzel',serif",fontSize:"0.48rem",letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(201,168,76,0.5)",background:"transparent",border:"1px solid rgba(201,168,76,0.18)",borderRadius:2,padding:"0.35rem 0.7rem",cursor:"pointer"}}>Nouveau</button>}
            </div>
          </div>

          {lastExtracted && (
            <div style={{padding:"0.6rem 1.8rem",background:"rgba(201,168,76,0.06)",borderBottom:"1px solid rgba(201,168,76,0.12)",display:"flex",alignItems:"center",gap:"1rem",animation:"fadeIn 0.3s ease"}}>
              <span style={{fontFamily:"'Cinzel',serif",fontSize:"0.44rem",letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(201,168,76,0.7)"}}>◈ Mémoire mise à jour · échange archivé</span>
              <div style={{display:"flex",flexWrap:"wrap",gap:"0.25rem"}}>
                {(lastExtracted.manipulations||[]).map(m=><Badge key={m} label={MANIP_LABELS[m]||m} dim />)}
                {(lastExtracted.versets_utilises||[]).slice(0,4).map(v=><span key={v} style={{fontFamily:"'Cinzel',serif",fontSize:"0.44rem",color:"rgba(201,168,76,0.5)",letterSpacing:"0.06em"}}>{v}</span>)}
              </div>
            </div>
          )}

          {apiError && (
            <div style={{padding:"0.7rem 1.8rem",background:"rgba(192,57,43,0.12)",borderBottom:"1px solid rgba(192,57,43,0.3)",fontFamily:"'Cormorant Garamond',serif",fontSize:"0.85rem",color:"#e74c3c",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>⚠ {apiError}</span>
              <button onClick={()=>setApiError("")} style={{background:"none",border:"none",color:"#e74c3c",cursor:"pointer",fontSize:"1rem"}}>✕</button>
            </div>
          )}

          {messages.length===0 && (
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"3rem 2rem",textAlign:"center"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"2rem",fontWeight:700,color:"#c9a84c",letterSpacing:"0.06em",marginBottom:"0.6rem"}}>الْحُجَّةُ الْقُرْآنِيَّةُ</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",color:"rgba(240,226,192,0.6)",maxWidth:500,lineHeight:1.9,marginBottom:"0.5rem"}}>
                Présente un argument doctrinal, une citation de tradition, un raisonnement hors-coranique. L'agent l'identifie, le déconstruit par le texte coranique seul, et établit la position correcte.
              </div>
              {memory.length>0
                ? <div style={{fontFamily:"'Cinzel',serif",fontSize:"0.48rem",letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(201,168,76,0.6)",marginBottom:"2rem"}}>◈ {memory.length} échange{memory.length>1?"s":""} en mémoire — l'agent est entraîné</div>
                : <div style={{marginBottom:"2rem"}} />}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem",maxWidth:540,width:"100%"}}>
                {["Il faut suivre la sunna du Prophète","Le ḥadīth complète le Coran","Les savants de l'islām s'accordent sur...","S.4:59 ordonne de suivre le nabī","L'ijmāʿ a force de loi en islām","Le Prophète est la meilleure des créatures"].map(ex=>(
                  <button key={ex} onClick={()=>setInput(ex)} style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"0.8rem",color:"rgba(240,226,192,0.6)",background:"rgba(255,255,255,0.025)",border:"1px solid rgba(201,168,76,0.12)",borderRadius:3,padding:"0.65rem 0.9rem",cursor:"pointer",textAlign:"left",lineHeight:1.5}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(201,168,76,0.35)"}
                    onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(201,168,76,0.12)"}>
                    "{ex}"
                  </button>
                ))}
              </div>
            </div>
          )}

          {messages.length>0 && (
            <div style={{flex:1,overflowY:"auto",padding:"1.8rem"}}>
              {messages.map((msg,i)=><MessageBlock key={i} msg={msg} />)}
              <div ref={bottomRef} />
            </div>
          )}

          <div style={{borderTop:"1px solid rgba(201,168,76,0.12)",background:"rgba(0,0,0,0.28)",padding:"1rem 1.8rem",position:"sticky",bottom:0}}>
            <div style={{maxWidth:880,margin:"0 auto"}}>
              <div style={{display:"flex",gap:"0.7rem",alignItems:"flex-end"}}>
                <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&(e.ctrlKey||e.metaKey))handleSubmit();}}
                  placeholder="Présente ton argument, ta doctrine, ta citation... (Ctrl+Entrée pour envoyer)" rows={3}
                  style={{flex:1,background:"rgba(255,255,255,0.035)",border:"1px solid rgba(201,168,76,0.18)",borderRadius:3,color:"#f0e2c0",fontFamily:"'Cormorant Garamond',serif",fontSize:"0.9rem",lineHeight:1.75,padding:"0.7rem 1rem",resize:"vertical",minHeight:70}} />
                <button onClick={handleSubmit} disabled={loading||!input.trim()}
                  style={{fontFamily:"'Cinzel',serif",fontSize:"0.58rem",letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:700,background:loading||!input.trim()?"rgba(201,168,76,0.18)":"#c9a84c",color:loading||!input.trim()?"rgba(201,168,76,0.4)":"#16130e",border:"none",borderRadius:3,padding:"0.7rem 1.2rem",cursor:loading||!input.trim()?"not-allowed":"pointer",whiteSpace:"nowrap",alignSelf:"stretch",minWidth:85}}>
                  {loading?"···":"Soumettre"}
                </button>
              </div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:"0.42rem",letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(240,226,192,0.25)",marginTop:"0.4rem"}}>
                Ctrl+Entrée pour envoyer · Chaque échange est archivé anonymement
              </div>
            </div>
          </div>

          {showMemory && <MemoryPanel memory={memory} onClose={()=>setShowMemory(false)} onClear={handleClearMemory} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<DebatAgent />);
  </script>
</body>
</html>
