<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  {% seo %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/assets/img/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/img/favicon.png' | relative_url }}">
</head>
<body class="with-sidebar">

  {% include nav.html %}

  <div class="page-layout">
    {% include sidebar.html %}
    <main class="page-main" id="main-content">
      {{ content }}
      {% include footer.html %}
    </main>
  </div>

  <script src="{{ '/assets/js/nav.js' | relative_url }}"></script>
  <script>
    // Sidebar toggle
    const sbt = document.getElementById('sidebar-toggle');
    const sb = document.getElementById('site-sidebar');
    if (sbt && sb) {
      sbt.addEventListener('click', () => {
        sb.classList.toggle('open');
        sbt.setAttribute('aria-expanded', sb.classList.contains('open'));
      });
    }
  </script>
  {% if page.search %}
  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
  {% endif %}
  <script src="{{ '/assets/js/audio.js' | relative_url }}"></script>

</body>
</html>
