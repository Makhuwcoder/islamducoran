title: "islamducoran.fr"
description: "Le Coran lu par lui-même, en arabe classique — Sans tafsir - Sans hadith - Sans ecole"
baseurl: ""
url: "https://islamducoran.fr"
lang: "fr"

# Build
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  parse_block_html: false

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  etudes:
    output: true
    permalink: /etudes/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "etudes"
    values:
      layout: "etude"

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# SEO
author: "islamducoran.fr"

# Navigation principale (barre horizontale top)
nav_items:
  - title: "Accueil"
    url: "/"
  - title: "Methode"
    url: "/methode/"
  - title: "Etudes"
    url: "/etudes/"
  - title: "Traduction du Coran"
    url: "/traduction/"
  - title: "Recherche"
    url: "/recherche/"
  - title: "Assistant"
    url: "/assistant/"
  - title: "Baraa"
    url: "/baraa/"

# Sidebar verticale
nav_sidebar:
  - group: "Le site"
    items:
      - title: "Decouvrir soi-meme"
        url: "/decouvrir/"
        ar: "اكْتَشِفْ"
      - title: "Pourquoi ce site"
        url: "/pourquoi/"
        ar: "لِمَاذَا"
      - title: "Sources lexicographiques"
        url: "/sources-lexicographiques/"
        ar: "الْمَصَادِر"
  - group: "La methode"
    items:
      - title: "Methode"
        url: "/methode/"
        ar: "الْمَنْهَج"
      - title: "Concepts fondamentaux"
        url: "/concepts/"
        ar: "مَفَاهِيم"
  - group: "Le Coran"
    items:
      - title: "Traduction du Coran"
        url: "/traduction/"
        ar: "التَّرْجَمَة"
      - title: "Comprendre avant de memoriser"
        url: "/comprendre/"
        ar: "اِفْهَمْ"
      - title: "Mediter le Coran"
        url: "/mediter/"
        ar: "التَّدَبُّر"
      - title: "Inventaire des du'a coraniques"
        url: "/etudes/duaa-coraniques/"
        ar: "الدُّعَاء الْقُرْآنِي"
  - group: "Etudes"
