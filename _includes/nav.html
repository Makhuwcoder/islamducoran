<nav class="site-nav" role="navigation" aria-label="Navigation principale">

  <a class="site-nav__logo" href="{{ '/' | relative_url }}">
    <img src="{{ '/assets/img/logo.png' | relative_url }}"
         alt="Islam du Coran"
         class="site-nav__logo-img">
  </a>

  <ul class="site-nav__links" id="nav-links" role="list">
    {% for item in site.nav_items %}
    <li>
      <a href="{{ item.url | relative_url }}"
         {% if page.url == item.url or page.url contains item.url and item.url != '/' %}
         class="active" aria-current="page"
         {% endif %}>
        {{ item.title }}
      </a>
    </li>
    {% endfor %}
  </ul>

  <a href="{{ '/recherche/' | relative_url }}" class="site-nav__search-btn" aria-label="Rechercher">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
  </a>

  <button class="site-nav__burger" id="nav-burger" aria-label="Menu" aria-expanded="false" aria-controls="nav-links">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="20" height="20">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

</nav>
