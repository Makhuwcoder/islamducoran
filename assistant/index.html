## IDENTITÉ ET MISSION

Tu es l'assistant islamducoran.fr — outil de recherche coranique rigoureux fondé exclusivement sur le texte du Coran en arabe classique et sur la lexicographie des trois sources : al-Farāhīdī (Kitāb al-ʿAyn), Ibn Fāris (Maqāyīs al-Lugha), Ibn Manẓūr (Lisān al-ʿArab).

## MÉTHODE — CHAQUE RÉPONSE DISTINGUE

- **DIT —** ce que le verset dit mot à mot (citer ref exacte S.x:y)
- **NON-DIT —** silence du texte — jamais comblé normativement
- **INFÉRENCE —** déduit du texte, toujours nommé comme tel

## QUALITÉ DES RÉPONSES

Réponses précises, éloquentes, structurées. Maîtrise réelle de l'arabe classique.
1. Identifier les racines avec leur sens primitif (al-aṣl) selon Ibn Fāris
2. Présenter les occurrences coraniques pertinentes avec référence exacte
3. Citer l'arabe avec tashkīl + translittération + traduction française
4. Distinguer DIT / NON-DIT / INFÉRENCE
5. Porter le sens en français élégant — jamais de calque de la structure arabe

## TERMINOLOGIE INVIOLABLE

- JAMAIS "divin/divine/divinité" → "d'Allaah", "propre à Allaah"

- JAMAIS "al-Khaḍir" → "un serviteur parmi Nos serviteurs" (18:65)

Aucun ḥadīth, tafsīr, ijmāʿ, qiyās, fatwa, école juridique comme source normative.

/* ── RENDU MARKDOWN ENRICHI ── */
function renderMD(text){
  // Tableaux
  text = text.replace(/(\|.+\|\n)+/g, m => {
    const rows = m.trim().split('\n');
    let html = '<table>';
    rows.forEach((row, i) => {
      if(/^\|[-\s|]+\|$/.test(row)) return;
      const cells = row.split('|').filter((_,j,a)=>j>0&&j<a.length-1);
      const tag = i===0?'th':'td';
      html += '<tr>' + cells.map(c=>`<${tag}>${renderInline(c.trim())}</${tag}>`).join('') + '</tr>';
    });
    return html + '</table>';
  });
  // Citations blockquote
  text = text.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
  // H1
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // H2
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  // H3
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  // HR
  text = text.replace(/^---+$/gm, '<hr>');
  // Labels DIT / NON-DIT / INFÉRENCE
  text = text.replace(/\bDIT\s*—/g, '<span class="tag-dit">DIT</span>');
  text = text.replace(/\bNON-DIT\s*—/g, '<span class="tag-nondit">NON-DIT</span>');
  text = text.replace(/\bINFÉRENCE\s*—/g, '<span class="tag-inf">INFÉRENCE</span>');
  // Paragraphes
  const lines = text.split('\n');
  let out = '', inPre = false;
  lines.forEach(line => {
    if(line.startsWith('<h')||line.startsWith('<hr')||line.startsWith('<blockquote')||line.startsWith('<table')||line.startsWith('</table')||line.startsWith('<tr')||line.startsWith('</tr')){
      out += line + '\n'; return;
    }
    if(line.trim()===''){out+='<br>';return;}
    out += '<p>' + renderInline(line) + '</p>\n';
  });
  return out;
}

function renderInline(t){
  return t
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/(https?:\/\/[^\s<"]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function switchToChat(){
  if(chatActive)return;
  chatActive=true;
  document.getElementById('accueil').classList.add('hidden');
  document.getElementById('chat-mode').classList.add('active');
  document.getElementById('float-toggle').classList.add('visible');
}

function toggleFloat(){
  floatOpen=!floatOpen;
  const fi=document.getElementById('float-input');
  const btn=document.getElementById('float-toggle');
  if(floatOpen){fi.classList.remove('hidden');btn.textContent='✕ Fermer';}
  else{fi.classList.add('hidden');btn.textContent='+ Question';}
}

function newConversation(){
  H=[];chatActive=false;
  document.getElementById('msgs').innerHTML='';
  document.getElementById('chat-mode').classList.remove('active');
  document.getElementById('accueil').classList.remove('hidden');
  document.getElementById('float-toggle').classList.remove('visible');
  document.getElementById('float-input').classList.add('hidden');
  document.getElementById('inp-accueil').value='';
  floatOpen=false;
}

function addMsg(role,text){
  const m=document.getElementById('msgs');
  const d=document.createElement('div');d.className='msg msg-'+role;
  const b=document.createElement('div');b.className='bbl';
  if(role==='a'){
    const r=document.createElement('div');r.className='resp';
    r.innerHTML=renderMD(text);b.appendChild(r);
  } else {b.textContent=text;}
  d.appendChild(b);m.appendChild(d);m.scrollTop=m.scrollHeight;
}

function dots(show){
  const m=document.getElementById('msgs');
  const ex=document.getElementById('_dots');
  if(show&&!ex){
    const d=document.createElement('div');d.className='msg msg-a';d.id='_dots';
    d.innerHTML='<div class="bbl"><div class="dots-w"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
    m.appendChild(d);m.scrollTop=m.scrollHeight;
  } else if(!show&&ex) ex.remove();
}

function qs(b,mode){document.getElementById('inp-'+mode).value=b.textContent;sendFrom(mode);}

async function sendFrom(mode){
  const inp=document.getElementById('inp-'+mode);
  const btn=document.getElementById('btn-'+mode);
  const t=inp.value.trim();
  if(!t||(btn&&btn.disabled))return;
  ['accueil','float'].forEach(m=>{const b=document.getElementById('btn-'+m);if(b)b.disabled=true;});
  inp.value='';inp.style.height='auto';
  switchToChat();
  if(mode==='float'){
    document.getElementById('float-input').classList.add('hidden');
    floatOpen=false;
    document.getElementById('float-toggle').textContent='+ Question';
  }
  addMsg('u',t);
  H.push({role:'user',content:t});
  dots(true);
  try{
    const res=await fetch(PROXY,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SYS,messages:H.slice(-14)})
    });
    const data=await res.json();
    dots(false);
    if(data?.content?.[0]?.text){
      const rep=data.content[0].text;
      H.push({role:'assistant',content:rep});
      addMsg('a',rep);
    } else {
      addMsg('a','⚠ '+(data?.error?.message||JSON.stringify(data?.error)||'Erreur'));
    }
  } catch(err){dots(false);addMsg('a','⚠ Erreur : '+err.message);}
  ['accueil','float'].forEach(m=>{const b=document.getElementById('btn-'+m);if(b)b.disabled=false;});
  if(chatActive){document.getElementById('float-toggle').classList.add('visible');}
}

['inp-accueil','inp-float'].forEach(id=>{
  const ta=document.getElementById(id);if(!ta)return;
  ta.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
  ta.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendFrom(id.replace('inp-',''));}});
});
</script>
